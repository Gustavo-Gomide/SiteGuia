<!-- Header parcial reutilizável: logo, tema e navegações -->
<header>
  <div class="header-content">

    <!-- Logo + Busca — agrupados e centralizados -->
    <div class="header-center">
      <h1 class="header-logo-area">
        <a href="#" id="logo-link" class="text-decoration-none hover-accent hover-imagem-grow">
          <span class="logo-wrap" aria-hidden="true"><span class="logo header-logo"></span></span>
          <span class="site-title-text">Site Guia</span>
        </a>
      </h1>

      <form
        id="search-form"
        class="search-form"
        role="search"
        aria-label="Buscar página"
        autocomplete="off">
        <div class="search-input-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            id="search-input"
            class="search-input"
            type="search"
            placeholder="Buscar página..."
            aria-label="Buscar página"
            aria-autocomplete="list"
            aria-controls="search-dropdown"
            spellcheck="false"
          />
        </div>
        <ul id="search-dropdown" class="search-dropdown" role="listbox" aria-label="Resultados da busca"></ul>
      </form>
    </div>

    <!-- Botão de tema — ação secundária à direita -->
    <div class="header-actions">
      <button class="theme-toggle" id="theme-toggle" title="Alternar tema"><span data-svg="light_theme" aria-hidden="true"></span></button>
    </div>

  </div>

  <!-- Menu lateral principal -->
  <nav class="nav-lateral">
    <div class="nav-lateral-header">
      <span class="logo-wrap" aria-hidden="true"><span class="logo nav-lateral-logo"></span></span>
      <div class="logo-open">Navegação</div>
    </div>
    <ul><!-- Será preenchido dinamicamente --></ul>
  </nav>

  <!-- Menu lateral interno -->
  <nav class="nav-interno">
    <div class="nav-interno-header">
      <h3>Nesta Página</h3>
    </div>
    <ul>
    </ul>
  </nav>
</header>
