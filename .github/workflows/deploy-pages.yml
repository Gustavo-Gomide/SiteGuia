name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare publish artifact
        shell: bash
        run: |
          set -euo pipefail

          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_SEG="${REPO_NAME}/"

          rm -rf dist-pages
          mkdir -p dist-pages

          # Copia todo o site para o diretório de publicação (sem .git)
          rsync -a --delete \
            --exclude '.git' \
            --exclude 'dist-pages' \
            ./ dist-pages/

          # Reescreve caminhos absolutos para funcionar em subpath do Pages:
          # "/css/..." -> "/<repo>/css/..."
          # Escopo propositalmente restrito para evitar alterar texto de conteúdo.
          cat > /tmp/rewrite-html-paths.pl <<'PERL'
          my $base = $ENV{"BASE_SEG"} // die "BASE_SEG not set";
          $base =~ s{^/}{};
          $base =~ s{/+$}{};
          $base .= '/';

          s{(\b(?:href|src|data-include|action|poster)\s*=\s*["'])/(?!/|\Q$base\E)}{$1/$base}ig;
          PERL

          export BASE_SEG
          while IFS= read -r -d '' file; do
            perl -i -p /tmp/rewrite-html-paths.pl "$file"
          done < <(find dist-pages -type f -name '*.html' -print0)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
